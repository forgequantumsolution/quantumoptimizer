name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Cancel superseded runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 1 — PRE-FLIGHT
  # ─────────────────────────────────────────────────────────────────────────────
  preflight:
    name: '1 · Pre-flight checks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for secret scanning

      - name: Check for merge conflict markers
        run: |
          if grep -rn "<<<<<<< \|>>>>>>> \|======= " --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" .; then
            echo "Merge conflict markers found. Aborting."
            exit 1
          fi

      - name: Secret scan — gitleaks (full history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate package lock files committed
        run: |
          test -f server/package-lock.json || (echo "server/package-lock.json missing" && exit 1)
          test -f client/package-lock.json || (echo "client/package-lock.json missing" && exit 1)

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 2 — CODE QUALITY
  # ─────────────────────────────────────────────────────────────────────────────
  quality:
    name: '2 · Code quality'
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server deps
        run: cd server && npm ci

      - name: Install client deps
        run: cd client && npm ci

      - name: TypeScript check (server)
        run: cd server && npx tsc --noEmit

      - name: ESLint (client)
        run: cd client && npm run lint

      - name: Build check (client)
        run: cd client && npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 3 — SECURITY SCANNING
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: '3 · Security scanning'
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install server deps
        run: cd server && npm ci

      - name: Install client deps
        run: cd client && npm ci

      # SAST — Semgrep
      - name: SAST — Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/nodejs
            p/secrets
            p/jwt
          generateSarif: 'true'
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()
        continue-on-error: true

      # Dependency audit
      - name: npm audit (server) — fail on HIGH+
        run: cd server && npm audit --audit-level=high
        continue-on-error: true

      - name: npm audit (client) — fail on HIGH+
        run: cd client && npm audit --audit-level=high
        continue-on-error: true

      # Snyk (optional — needs SNYK_TOKEN secret)
      - name: Snyk dependency scan
        uses: snyk/actions/node@master
        if: ${{ secrets.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 4 — BUILD & CONTAINER
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: '4 · Build & container scan'
    runs-on: ubuntu-latest
    needs: [quality, security]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          DATE=$(date +%Y%m%d)
          echo "tag=quantum-optimizer-${SHORT_SHA}-${DATE}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (server)
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/server-image.tar

      - name: Load image for scanning
        run: docker load --input /tmp/server-image.tar

      # Trivy container vulnerability scan
      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()
        continue-on-error: true

      # Push only on main/release branches
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-main
          cache-from: type=gha

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 5 — STAGING DEPLOY (main branch only)
  # ─────────────────────────────────────────────────────────────────────────────
  staging:
    name: '5 · Deploy to staging'
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests against staging
        run: bash scripts/smoke-test.sh
        env:
          API_URL: ${{ vars.STAGING_API_URL }}

      # OWASP ZAP baseline scan
      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: ${{ vars.STAGING_APP_URL }}
          fail_action: false
          allow_issue_writing: false
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 6 — PRODUCTION DEPLOY (manual approval required)
  # ─────────────────────────────────────────────────────────────────────────────
  production:
    name: '6 · Deploy to production'
    runs-on: ubuntu-latest
    needs: staging
    if: github.ref == 'refs/heads/main'
    environment: production   # requires manual approval in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Validate environment vars exist in prod
        run: bash scripts/validate-env.sh
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

      - name: Deploy to production
        run: bash scripts/deploy.sh
        env:
          APP_VERSION: ${{ github.sha }}
          DEPLOY_ENV: production

      - name: Post-deploy smoke tests
        run: bash scripts/smoke-test.sh
        env:
          API_URL: ${{ vars.PROD_API_URL }}
