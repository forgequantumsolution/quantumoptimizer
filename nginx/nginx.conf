# ─────────────────────────────────────────────────────────────────────────────
# Quantum Optimizer — Hardened Nginx Configuration
# TLS 1.3 preferred, HSTS, all security headers, rate limiting, attack blocking
# ─────────────────────────────────────────────────────────────────────────────

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;                     # writable by non-root

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  # ── Hide version info ────────────────────────────────────────────────────────
  server_tokens off;
  more_clear_headers Server;            # requires ngx_http_headers_more

  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Structured access logging ────────────────────────────────────────────────
  log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"remote_addr":"$remote_addr",'
    '"request_id":"$request_id"}';

  access_log /var/log/nginx/access.log json_combined;

  # Add request ID to every request (propagated to upstream)
  add_header X-Request-ID $request_id always;

  # ── Performance ───────────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/xml text/javascript image/svg+xml;
  gzip_min_length 1024;
  gzip_proxied any;

  # ── Rate limiting zones ────────────────────────────────────────────────────────
  limit_req_zone  $binary_remote_addr zone=api:10m        rate=100r/m;
  limit_req_zone  $binary_remote_addr zone=auth:10m       rate=10r/m;
  limit_req_zone  $binary_remote_addr zone=uploads:10m    rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=perip:10m;

  # ── TLS session cache ──────────────────────────────────────────────────────────
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  # ── TLS protocol and cipher configuration ─────────────────────────────────────
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers   ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
  ssl_prefer_server_ciphers off;       # TLS 1.3 handles this
  ssl_stapling on;
  ssl_stapling_verify on;

  # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── Unknown server names → close connection (no response) ────────────────────
  server {
    listen 443 ssl default_server;
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    return 444;
  }

  # ── Main application server ────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name app.quantumoptimizer.io;   # replace with real domain

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # ── Security headers ─────────────────────────────────────────────────────────
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header X-Frame-Options             "DENY" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy  "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # ── Body and timeout limits ───────────────────────────────────────────────────
    client_max_body_size 1m;
    client_body_timeout  30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # ── Block common attack paths ─────────────────────────────────────────────────
    location ~* (\.env|\.git|\.htaccess|/etc/passwd|/proc/|wp-admin|phpinfo) {
      return 403;
    }

    # ── Auth endpoints — strict rate limit ────────────────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      limit_req_status 429;
      proxy_pass         http://api:3001;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $request_id;
    }

    # ── API — general rate limit ──────────────────────────────────────────────────
    location /api/ {
      limit_req  zone=api burst=50 nodelay;
      limit_conn perip 20;
      limit_req_status 429;
      proxy_pass         http://api:3001;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $request_id;
      proxy_read_timeout 30s;
    }

    # ── Metrics endpoint — internal only ─────────────────────────────────────────
    location /metrics {
      allow 10.0.0.0/8;      # internal network only
      allow 172.16.0.0/12;
      deny all;
      proxy_pass http://api:3001;
    }

    # ── Frontend static assets ────────────────────────────────────────────────────
    location / {
      root  /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;

      # Cache static assets aggressively
      location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }
  }
}
